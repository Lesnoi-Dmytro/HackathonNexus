services:
  postgres:
    image: postgres:18.3-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hackathon_nexus
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  hackathon-nexus-api:
    build: ./hackathon-nexus-api
    ports:
      - "${API_PORT:-3000}:3000"
    env_file:
      - ./hackathon-nexus-api/.env
    environment:
      PORT: "3000"
      DB_HOST: postgres
      DB_PORT: "5432"
      RECOMMEND_API_URL: "http://recommendation-api:8000/api"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  hackathon-nexus-front:
    build:
      context: ./hackathon-nexus-front
      args:
        VITE_API_URL: "http://localhost:3000/api"
    ports:
      - "${FRONT_PORT:-5173}:80"
    depends_on:
      - hackathon-nexus-api

  redis-ui:
    image: redis/redisinsight:latest
    ports:
      - "${REDIS_UI_PORT:-5540}:5540"
    depends_on:
      redis:
        condition: service_healthy

  recommendation-api:
    build: ./recommendation-api
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - ./recommendation-api/.env
    environment:
      PORT: "8000"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
