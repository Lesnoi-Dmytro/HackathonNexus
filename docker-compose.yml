services:
  redis:
    image: redis:8.6.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  recommendation-api:
    build: ./recommendation-api
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - ./recommendation-api/.env
    environment:
      PORT: "8000"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
