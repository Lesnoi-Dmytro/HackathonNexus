services:
  postgres:
    image: postgres:18.3-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hackathon_nexus
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  recommendation-api:
    build: ./recommendation-api
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - ./recommendation-api/.env
    environment:
      PORT: "8000"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
